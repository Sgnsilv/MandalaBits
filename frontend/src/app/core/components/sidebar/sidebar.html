<aside class="h-full flex flex-col justify-between py-10 bg-surface-container-lowest transition-all duration-300 relative"
       [class.w-64]="isExpanded"
       [class.w-20]="!isExpanded"
       [class.px-6]="isExpanded"
       [class.px-4]="!isExpanded">

  <button (click)="toggle()" 
          class="absolute -right-3 top-10 bg-surface-container-lowest text-outline-variant hover:text-primary w-6 h-6 rounded-full flex items-center justify-center shadow-[0_4px_12px_rgba(34,100,142,0.1)] transition-colors z-20 cursor-pointer">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300" [class.rotate-180]="!isExpanded">
      <path d="m15 18-6-6 6-6"/>
    </svg>
  </button>

  <div>
    <div class="mb-14 pl-2 h-10 flex flex-col justify-center overflow-hidden whitespace-nowrap">
      @if (isExpanded) {
        <h1 class="font-serif text-3xl text-primary mb-1 italic tracking-wide">Mandalabits</h1>
      } @else {
        <h1 class="font-serif text-3xl text-primary italic tracking-wide text-center -ml-2">M</h1>
      }
    </div>

    <nav class="flex flex-col gap-2">
      <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-lg bg-surface-container-low text-primary font-medium transition-all overflow-hidden whitespace-nowrap" [class.justify-center]="!isExpanded">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
        @if (isExpanded) { <span class="text-sm">Calendário</span> }
      </a>

      <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-lg text-outline-variant hover:bg-surface-container hover:text-on-surface transition-all overflow-hidden whitespace-nowrap" [class.justify-center]="!isExpanded">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        @if (isExpanded) { <span class="text-sm">Habit Tracker</span> }
      </a>

      <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-lg text-outline-variant hover:bg-surface-container hover:text-on-surface transition-all overflow-hidden whitespace-nowrap" [class.justify-center]="!isExpanded">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
        @if (isExpanded) { <span class="text-sm">Finanças</span> }
      </a>

      <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-lg text-outline-variant hover:bg-surface-container hover:text-on-surface transition-all overflow-hidden whitespace-nowrap" [class.justify-center]="!isExpanded">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="8" x="2" y="3" rx="2" ry="2"/><rect width="20" height="8" x="2" y="13" rx="2" ry="2"/><line x1="10" x2="14" y1="7" y2="7"/><line x1="10" x2="14" y1="17" y2="17"/></svg>
        @if (isExpanded) { <span class="text-sm">Arquivo</span> }
      </a>
    </nav>
  </div>

  <div class="overflow-hidden">
    <button (click)="openModal.emit()" class="w-full py-3 rounded-lg bg-gradient-to-br from-primary to-primary-dim text-white font-medium shadow-[0_12px_30px_rgba(34,100,142,0.15)] hover:shadow-[0_16px_40px_rgba(34,100,142,0.25)] hover:-translate-y-0.5 transition-all flex items-center gap-2 whitespace-nowrap"
            [class.justify-center]="isExpanded"
            [class.px-0]="!isExpanded">
      <svg class="shrink-0" [class.ml-3]="!isExpanded" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
      @if (isExpanded) { <span>Nova Entrada</span> }
    </button>
  </div>

</aside>
